.logo{

.logo span{

        0 0 30px #ff4400,
        0 0 60px red;

    animation:
        vibrar 0.03s infinite alternate,
        color 0.2s infinite alternate;
}

/* ROMPER */

.w{ animation:
    vibrar 0.03s infinite alternate,
    color 0.2s infinite alternate,
    romper 0.7s forwards 0.1s;
}

.r{ animation:
    vibrar 0.03s infinite alternate,
    color 0.2s infinite alternate,
    romper 0.7s forwards 0.3s;
}

.e{ animation:
    vibrar 0.03s infinite alternate,
    color 0.2s infinite alternate,
    romper 0.7s forwards 0.5s;
}

.c{ animation:
    vibrar 0.03s infinite alternate,
    color 0.2s infinite alternate,
    romper 0.7s forwards 0.7s;
}

.k{ animation:
    vibrar 0.03s infinite alternate,
    color 0.2s infinite alternate,
    romper 0.7s forwards 0.9s;
}

@keyframes vibrar{

    from{
        transform:translate(-2px,2px);
    }

    to{
        transform:translate(2px,-2px);
    }
}

@keyframes color{

    from{
        color:#ffe600;
    }

    to{
        color:#ff0000;
    }
}

@keyframes romper{

    0%{
        opacity:1;
        transform:scale(1);
    }

    100%{
        opacity:0;

        transform:
        translateY(200px)
        rotate(25deg)
        scale(0.1);

        filter:blur(10px);
    }
}

@keyframes flash{

    from{
        opacity:0.1;
    }

    to{
        opacity:0.8;
    }
}

@keyframes desaparecer{

    to{
        opacity:0;
        visibility:hidden;
    }
}

</style>

<script>

let cards = [];
let currentCardIndex = 0;
let orbHistory = [];
let eventCards = [];
let lastEventIndex = -1;
let shuffledEvents = [];
let currentEventIndex = 0;
let soundEnabled = true;
let lastRandom = null;
let lastEventRandom = null;
let availableEventNumbers = [];
let repeatCount = 0;
let recentGreenNumbers = [];
let lastCubeAmount = null;
let protectedCards = [];
let globalAudio = null;
let audioReady = false;
let firstNext = true;
let readyMode = true;
let cardHistory = [];
let historyIndex = -1;
let lastWasEvent = false;
let nextLocked = false;
let normalCount = 0;
let lastEventDistance = null;
let maxReduction = 1;

const fileInput = document.getElementById("fileInput");
const importFile = document.getElementById("importFile");
const deck = document.getElementById("deck");
const cardCount = document.getElementById("cardCount");
const mainCard = document.getElementById("mainCard");
const eventInput = document.getElementById("eventInput");
const eventDeck = document.getElementById("eventDeck");
const eventCount = document.getElementById("eventCount");
const protectedInput = document.getElementById("protectedInput");
const protectedDeck = document.getElementById("protectedDeck");
const protectedCount = document.getElementById("protectedCount");

document
.getElementById("soundToggle")
.addEventListener(
"change",
function(){

soundEnabled =
this.checked;
});

fileInput.addEventListener("change", function(event){

const files = event.target.files;

for(let file of files){

const reader = new FileReader();

reader.onload = function(e){

compressImage(file,function(compressed){

cards.push(compressed);

displayDeck();

});

const eventTriggered =
tryEventCard();

if(!eventTriggered){

showCard(currentCardIndex);
}

generateRandomOrb();

}

reader.readAsDataURL(file);
}
});

eventInput.addEventListener(
    
"change",
function(event){

const files = event.target.files;

for(let file of files){

compressImage(file,function(compressed){

eventCards.push(compressed);

displayEventDeck();

});
}
});

protectedInput.addEventListener(
"change",
function(event){

const files = event.target.files;

for(let file of files){

compressImage(file,function(compressed){

protectedCards.push(compressed);

cards.push(compressed);

displayProtectedDeck();

});
}
});

function displayProtectedDeck(){

protectedDeck.innerHTML = "";

protectedCards.forEach((card,index)=>{

const div =
document.createElement("div");

div.className = "cardThumb";

div.innerHTML = `

<button class="removeBtn"
onclick="removeProtectedCard(${index})">

X

</button>

<img src="${card}">
`;

protectedDeck.appendChild(div);
});

protectedCount.innerText =
protectedCards.length;
}

function removeProtectedCard(index){

const removedCard = protectedCards[index];

protectedCards.splice(index,1);

// borrar también del deck normal
cards = cards.filter(card => card !== removedCard);

displayProtectedDeck();
displayDeck();

if(currentCardIndex >= cards.length){

currentCardIndex = 0;
}

showCard(currentCardIndex);
}

function playBeep(){

if(!soundEnabled) return;

const audio =
new AudioContext();

const osc =
audio.createOscillator();

const gain =
audio.createGain();

osc.connect(gain);

gain.connect(audio.destination);

osc.frequency.value = 440;

osc.type = "square";

gain.gain.value = 0.2;

osc.start();

osc.stop(audio.currentTime + 0.1);
}

function toggleMenu(){
document.getElementById("submenu")
.classList.toggle("hidden");
}

function displayEventDeck(){

eventDeck.innerHTML = "";

eventCards.forEach((card,index)=>{

const div =
document.createElement("div");

div.className = "cardThumb";

div.innerHTML = `

<button class="removeBtn"
onclick="removeEventCard(${index})">

X

</button>

<img src="${card}">
`;

eventDeck.appendChild(div);
});

eventCount.innerText =
eventCards.length;
}

function tryEventCard(){

if(eventCards.length === 0){

return false;
}

cardsSinceEvent++;

/* EVITAR DOS EVENTOS SEGUIDOS */

if(lastWasEvent){

lastWasEvent = false;

return false;
}

const chance =
parseInt(
document.getElementById(
"difficulty"
).value
);

const limit69 =
document.getElementById(
"eventLimit69"
).checked;

const minCards =
limit69 ? 5 : 7;

const maxCards =
limit69 ? 9 : 11;

/* AJUSTAR MAXIMO SI EL ULTIMO EVENTO FUE EN EL MAXIMO */

let effectiveMax =
maxCards - maxReduction;

if(
lastEventDistance === maxCards
){

effectiveMax--;

}

let triggerEvent = false;

/* NUNCA ANTES DEL MINIMO */

if(cardsSinceEvent >= minCards){

const roll =
Math.random() * 100;

let blocked = false;

/* BLOQUEAR MINIMO SEGUIDO */

if(
cardsSinceEvent === minCards &&
lastEventDistance === minCards
){

blocked = true;
}

/* BLOQUEAR MAXIMO SEGUIDO */

if(
cardsSinceEvent === maxCards &&
lastEventDistance === maxCards
){

blocked = true;
}

if(
roll < chance &&
!blocked
){

triggerEvent = true;
}
}

/* FORZAR AL MAXIMO */

if(cardsSinceEvent >= effectiveMax){

triggerEvent = true;
}

if(triggerEvent){

lastEventDistance =
cardsSinceEvent;

maxReduction = 0;

cardsSinceEvent = 0;

lastWasEvent = true;

mainCard.src =
shuffledEvents[
currentEventIndex
];

currentEventIndex++;

generateEventOrb();

playEventSound();

flashEventExplosion();

/* GUARDAR EN HISTORIAL */

const saveData = {

cardIndex: currentCardIndex,

isEvent: true,

cardSrc: mainCard.src,

orbNumber:
document.getElementById("orbNumber")
.innerText,

cubes:
document.getElementById("orbCubes")
.innerHTML,

orbClass: "eventOrb"
};

cardHistory.push(saveData);

historyIndex =
cardHistory.length - 1;

return true;
}

return false;
}

let cardsSinceEvent = 0;

document.getElementById("eventDeck")
.classList.add("hidden");

function compressImage(file, callback){

const reader = new FileReader();

reader.onload = function(e){

const img = new Image();

img.onload = function(){

const canvas =
document.createElement("canvas");

const ctx =
canvas.getContext("2d");

const maxWidth = 500;

const scale =
maxWidth / img.width;

canvas.width = maxWidth;

canvas.height =
img.height * scale;

ctx.drawImage(
img,
0,
0,
canvas.width,
canvas.height
);

const compressed =
canvas.toDataURL(
"image/jpeg",
0.7
);

callback(compressed);
};

img.src = e.target.result;
};

reader.readAsDataURL(file);
}

function playEventSound(){

if(!soundEnabled) return;

const audio =
new AudioContext();

const osc =
audio.createOscillator();

const gain =
audio.createGain();

osc.connect(gain);

gain.connect(audio.destination);

osc.type = "sawtooth";

gain.gain.value = 0.15;

osc.frequency.setValueAtTime(
220,
audio.currentTime
);


osc.frequency.linearRampToValueAtTime(
420,
audio.currentTime + 0.3
);

osc.frequency.linearRampToValueAtTime(
180,
audio.currentTime + 0.6
);

osc.frequency.linearRampToValueAtTime(
420,
audio.currentTime + 0.9
);

osc.frequency.linearRampToValueAtTime(
140,
audio.currentTime + 1.2
);

osc.frequency.linearRampToValueAtTime(
420,
audio.currentTime + 1.5
);

osc.start();

osc.stop(audio.currentTime + 1.6);
}

function showReadyScreen(){

firstNext = true;

document.getElementById(
"memoryBanner"
).style.display = "none";


const readyOverlay =
document.getElementById(
"readyOverlay"
);

if(readyOverlay){

readyOverlay.style.display =
"flex";

readyOverlay.classList.remove(
"fadeReady"
);
}

document.getElementById(
"nextBtn"
).innerHTML = "START";
}

function showRandomEvent(){

let randomIndex;

do{

randomIndex =
Math.floor(
Math.random() * eventCards.length
);

}while(
randomIndex === lastEventIndex
&& eventCards.length > 1
);

lastEventIndex = randomIndex;

mainCard.src =
eventCards[randomIndex];

generateEventOrb();

playEventSound();
}

function refillEventNumbers(){

availableEventNumbers = [];

const forbidden = [
20,
30,
40,
50,
60,
70,
80,
90,
22,
33,
44,
55,
66,
77,
88
];

const limit69 =
document.getElementById("eventLimit69").checked;

const maxEventNumber =
limit69 ? 69 : 98;

for(let i = 12; i <= maxEventNumber; i++){

if(!forbidden.includes(i)){

availableEventNumbers.push(i);
}
}
}

function displayDeck(){

deck.innerHTML = "";

cards.forEach((card,index)=>{

const div = document.createElement("div");

div.className = "cardThumb";

div.innerHTML = `
<button class="removeBtn"
onclick="removeCard(${index})">X</button>

<img src="${card}">
`;

deck.appendChild(div);
});

cardCount.innerText = cards.length;
}
function removeEventCard(index){

eventCards.splice(index,1);

displayEventDeck();
}

function showCard(index){

if(cards.length === 0){
document.getElementById("emptyText")
.style.display = "block";
mainCard.src = "";
return;
}

mainCard.src = cards[index];

document.getElementById("emptyText")
.style.display = "none";
}

function generateRandomOrb(){

if(cards.length === 0){

return false;
}


function updateOrbCubes(amount){

const container =
document.getElementById("orbCubes");

container.innerHTML = "";

for(let i = 0; i < amount; i++){

const cube =
document.createElement("div");

cube.style.width = "11px";

cube.style.height = "11px";

cube.style.background = "linear-gradient(#00ff66,#008833)";

cube.style.border = "2px solid black";

cube.style.borderRadius = "2px";

cube.style.transform = "translateY(-3px)";

cube.style.boxShadow =
"0 0 7px #00ff66";

container.appendChild(cube);
}
}

const orb =
document.getElementById("randomOrb");

orb.className = "normalOrb";

const enabled =
document.getElementById("orbToggle").checked;

if(!enabled){

orb.style.display = "none";

return;
}

orb.style.display = "flex";

const addBox =
document.getElementById("addBox");

if(addBox){

addBox.style.display = "flex";
}

const min =

document.getElementById("minNumber").value
);

const limit69 =
document.getElementById("eventLimit69").checked;

const max =
limit69

: parseInt(
document.getElementById("maxNumber").value
);

let newNumber;

do{

newNumber =
Math.floor(
Math.random() *
(max - min + 1)
) + min;

}while(
recentGreenNumbers.includes(newNumber)
);

recentGreenNumbers.push(newNumber);

const historyLimit =
limit69 ? 3 : 5;

if(
recentGreenNumbers.length > historyLimit
){

recentGreenNumbers.shift();
}

lastRandom = newNumber;

document.getElementById("orbNumber")
.innerText = newNumber;

let mult;

do{

mult =
Math.floor(Math.random() * 3) + 1;

}while(mult === lastCubeAmount);

lastCubeAmount = mult;

updateOrbCubes(mult);
}

function playShuffleSound(){

if(!soundEnabled) return;

/* CREAR AUDIO */

if(!globalAudio){

globalAudio =
new(
window.AudioContext ||
window.webkitAudioContext
)();
}

const audio = globalAudio;

audio.resume();

const now = audio.currentTime;

/* MASTER GAIN */

const osc1 =
audio.createOscillator();

const gain1 =
audio.createGain();

osc1.type = "sawtooth";

osc1.frequency.setValueAtTime(
300,
audio.currentTime
);

osc1.frequency.linearRampToValueAtTime(
600,
audio.currentTime + 0.9
);

gain1.gain.setValueAtTime(
0.50,
audio.currentTime
);

gain1.gain.exponentialRampToValueAtTime(
0.001,
audio.currentTime + 1
);

osc1.connect(gain1);

gain1.connect(audio.destination);

osc1.start();

osc1.stop(audio.currentTime + 1);

/* OSC 2 */

const osc2 =
audio.createOscillator();

const gain2 =
audio.createGain();

osc2.type = "square";

osc2.frequency.setValueAtTime(
55,
audio.currentTime
);

osc2.frequency.linearRampToValueAtTime(
110,
audio.currentTime + 1
);

gain2.gain.setValueAtTime(
0.08,
audio.currentTime
);

gain2.gain.exponentialRampToValueAtTime(
0.001,
audio.currentTime + 1
);

osc2.connect(gain2);

gain2.connect(audio.destination);

osc2.start();

osc2.stop(audio.currentTime + 1);

/* FINAL BEEPS */

for(let i = 0; i < 3; i++){

setTimeout(()=>{

const osc3 =
audio.createOscillator();

const gain3 =
audio.createGain();

osc3.type = "triangle";

osc3.frequency.value = 900;

gain3.gain.setValueAtTime(
0.50,
audio.currentTime
);

gain3.gain.exponentialRampToValueAtTime(
0.001,
audio.currentTime + 0.18
);

osc3.connect(gain3);

gain3.connect(audio.destination);

osc3.start();

osc3.stop(
audio.currentTime + 0.18
);

},350 + (i * 500));

}

}

function shuffleDeck(){

if(cards.length === 0){

return;

}

setTimeout(()=>{

/* SHUFFLE NORMAL */

for(
let i = cards.length - 1;
i > 0;
i--
){

const j =
Math.floor(
Math.random() * (i + 1)
);

[cards[i], cards[j]] =
[cards[j], cards[i]];
}

/* EVITAR PROTEGIDAS */

const protectedLimit =
document.getElementById("eventLimit69").checked
? 5
: 7;

for(let i = 0; i < protectedLimit; i++){

if(
protectedCards.includes(cards[i])
){

for(
let j = protectedLimit;
j < cards.length;
j++
){

if(
!protectedCards.includes(cards[j])
){

[
cards[i],
cards[j]

] = [

cards[j],
cards[i]

];

break;
}
}
}
}

/* EVITAR PROTEGIDAS SEGUIDAS */

let normalCount = 0;

for(
let i = 0;
i < cards.length;
i++
){

if(
!protectedCards.includes(cards[i])
){

normalCount++;

if(
normalCount > 2 &&
i >= protectedLimit
){

for(
let j = i + 1;
j < cards.length;
j++
){

if(
protectedCards.includes(cards[j])
){

[
cards[i],
cards[j]

] = [

cards[j],
cards[i]

];

normalCount = 0;

break;
}
}
}

}else{

normalCount = 0;
}
}

for(
let i = 0;
i < cards.length - 1;
i++
){

if(

protectedCards.includes(cards[i]) &&

protectedCards.includes(cards[i + 1])

){

for(
let j = i + 2;
j < cards.length;
j++
){

if(
!protectedCards.includes(cards[j])
){

[
cards[i + 1],
cards[j]

] = [

cards[j],
cards[i + 1]

];

break;
}
}
}
}

/* SHUFFLE EVENTOS */

if(eventCards.length > 1){

for(
let i = eventCards.length - 1;
i > 0;
i--
){

const j =
Math.floor(
Math.random() * (i + 1)
);

[eventCards[i], eventCards[j]] =
[eventCards[j], eventCards[i]];
}

eventCards = [...eventCards];

}

shuffledEvents = [...eventCards];

currentEventIndex = 0;

currentCardIndex = 0;

cardHistory = [];

cardsSinceEvent = 2;

lastRandom = null;

lastEventRandom = null;

availableEventNumbers = [];

repeatCount = 0;

recentGreenNumbers = [];

lastCubeAmount = null;

lastEventDistance = null;

maxReduction = 2;

displayDeck();

displayEventDeck();

displayProtectedDeck();

showCard(0);

generateRandomOrb();

/* GUARDAR PRIMERA CARTA */

cardHistory = [];

const firstSave = {

cardIndex: 0,

isEvent: false,

cardSrc: mainCard.src,

orbNumber:
document.getElementById("orbNumber")
.innerText,

cubes:
document.getElementById("orbCubes")
.innerHTML,

orbClass:
document.getElementById("randomOrb")
.className
};

cardHistory.push(firstSave);

historyIndex = 0;

},100);
}
